<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>1일 1필사</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f3eee3;
    font-family:'Noto Serif KR', serif;
    display:flex;
    justify-content:center;
    padding:18px;
    color:#2d2d2d;
}

.page{
    width:100%;
    max-width:430px;
    background:#faf6ee;
    border-radius:28px;
    padding:30px 22px 40px;
    box-shadow:
    0 10px 35px rgba(0,0,0,0.06);
    position:relative;
    overflow:hidden;
}

/* 종이 질감 */
.page::before{
    content:'';
    position:absolute;
    inset:0;
    opacity:0.25;
    background-image:
    radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size:4px 4px;
    pointer-events:none;
}

/* 줄노트 */
.page::after{
    content:'';
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 41px,
        rgba(120,100,70,0.08) 42px
    );
    pointer-events:none;
}

.content{
    position:relative;
    z-index:2;
}

.top{
    text-align:center;
    margin-bottom:36px;
}

.date{
    font-size:14px;
    opacity:0.7;
    margin-bottom:10px;
}

.day{
    font-size:13px;
    letter-spacing:4px;
    opacity:0.45;
}

.quote{
    text-align:center;
    margin-bottom:38px;
}

.quote-text{
    font-size:26px;
    line-height:1.9;
    font-weight:400;
    white-space:pre-line;
    margin-bottom:24px;
    word-break:keep-all;
}

.author{
    font-size:15px;
    line-height:1.8;
    opacity:0.6;
}

.writing-wrap{
    position:relative;
    width:100%;
    height:430px;
    border-radius:20px;
    overflow:hidden;
    background:rgba(255,255,255,0.16);
    margin-bottom:28px;
}

.guide-text{
    position:absolute;
    inset:24px;
    font-size:30px;
    line-height:2.2;
    color:rgba(0,0,0,0.07);
    white-space:pre-line;
    pointer-events:none;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
    position:relative;
    z-index:2;
}

.buttons{
    display:flex;
    gap:12px;
}

button{
    flex:1;
    border:none;
    border-radius:16px;
    padding:16px;
    font-family:'Noto Serif KR', serif;
    font-size:15px;
    background:#ebe2d2;
    color:#4e4337;
    transition:0.15s;
}

button:active{
    transform:scale(0.98);
}

.footer{
    text-align:center;
    margin-top:28px;
    font-size:12px;
    opacity:0.45;
    line-height:1.8;
}

@media(max-width:480px){

    .quote-text{
        font-size:23px;
    }

    .guide-text{
        font-size:27px;
    }

    .writing-wrap{
        height:390px;
    }
}

</style>
</head>

<body>

<div class="page" id="capture">

<div class="content">

    <div class="top">
        <div class="date" id="dateText"></div>
        <div class="day" id="dayText"></div>
    </div>

    <div class="quote">

        <div class="quote-text" id="quoteText"></div>

        <div class="author">
            <span id="authorText"></span><br>
            <span id="engAuthorText"></span>
        </div>

    </div>

    <div class="writing-wrap">

        <!-- 흐린 따라쓰기 -->
        <div class="guide-text" id="guideText"></div>

        <!-- 필사 캔버스 -->
        <canvas id="canvas"></canvas>

    </div>

    <div class="buttons">
        <button onclick="clearCanvas()">다시 쓰기</button>
        <button onclick="saveImage()">사진 저장</button>
    </div>

    <div class="footer">
        오늘도 잘 살아냈다.<br>
        1일 1필사
    </div>

</div>

</div>

<script>

/* =========================
   365 명언 예시 데이터
========================= */

const quotes = [

{
    text:`힘든 하루였다는 건
그만큼 버텼다는 뜻이다.`,
    author:'공자',
    eng:'Confucius'
},

{
    text:`넘어졌다는 건
앞으로 나아갔다는 뜻이다.`,
    author:'노자',
    eng:'Laozi'
},

{
    text:`쉬어가는 것은
포기하는 것이 아니다.`,
    author:'세네카',
    eng:'Seneca'
},

{
    text:`Success is not final,
failure is not fatal.`,
    author:'윈스턴 처칠',
    eng:'Winston Churchill'
},

{
    text:`오늘의 작은 버팀이
내일의 나를 만든다.`,
    author:'맹자',
    eng:'Mencius'
},

{
    text:`상처 없는 사람보다
회복한 사람이 강하다.`,
    author:'니체',
    eng:'Nietzsche'
}

];

/* =========================
   날짜 계산
========================= */

const today = new Date();

const year = today.getFullYear();
const month = today.getMonth() + 1;
const date = today.getDate();

document.getElementById('dateText').innerText =
`${year}년 ${month}월 ${date}일`;

const start = new Date(year, 0, 0);
const diff = today - start;

const oneDay = 1000 * 60 * 60 * 24;

const dayNumber = Math.floor(diff / oneDay);

document.getElementById('dayText').innerText =
`DAY ${dayNumber}`;

/* =========================
   오늘 명언 자동 선택
========================= */

const quote = quotes[dayNumber % quotes.length];

document.getElementById('quoteText').innerText = quote.text;

document.getElementById('guideText').innerText = quote.text;

document.getElementById('authorText').innerText =
`— ${quote.author}`;

document.getElementById('engAuthorText').innerText =
quote.eng;

/* =========================
   캔버스 필기
========================= */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let drawing = false;

function resizeCanvas(){

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    ctx.lineWidth = 4;

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    ctx.strokeStyle = '#2d2d2d';
}

resizeCanvas();

window.addEventListener('resize', resizeCanvas);

function getXY(e){

    const rect = canvas.getBoundingClientRect();

    if(e.touches){

        return {
            x:e.touches[0].clientX - rect.left,
            y:e.touches[0].clientY - rect.top
        }

    }else{

        return {
            x:e.clientX - rect.left,
            y:e.clientY - rect.top
        }
    }
}

function startDraw(e){

    drawing = true;

    const pos = getXY(e);

    ctx.beginPath();

    ctx.moveTo(pos.x, pos.y);
}

function draw(e){

    if(!drawing) return;

    e.preventDefault();

    const pos = getXY(e);

    ctx.lineTo(pos.x, pos.y);

    ctx.stroke();
}

function endDraw(){

    drawing = false;

    ctx.beginPath();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);

canvas.addEventListener('touchstart', startDraw);
canvas.addEventListener('touchmove', draw);
canvas.addEventListener('touchend', endDraw);

/* =========================
   다시쓰기
========================= */

function clearCanvas(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* =========================
   저장하기
========================= */

function saveImage(){

    html2canvas(document.querySelector("#capture"),{
        backgroundColor:null,
        scale:2
    }).then(canvas => {

        const link = document.createElement('a');

        link.download =
        `1일1필사_DAY${dayNumber}.png`;

        link.href = canvas.toDataURL();

        link.click();
    });
}

</script>

</body>
</html>
