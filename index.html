<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>1일 1필사</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f3eee3;
    font-family:'Noto Serif KR', serif;
    display:flex;
    justify-content:center;
    padding:16px;
    color:#2d2d2d;
    overflow-x:hidden;
}

.app{
    width:100%;
    max-width:460px;
}

/* 상단 툴바 */

.toolbar{
    position:sticky;
    top:10px;
    z-index:999;
    background:rgba(250,246,238,0.92);
    backdrop-filter:blur(10px);
    border-radius:22px;
    padding:14px;
    margin-bottom:14px;
    box-shadow:0 8px 30px rgba(0,0,0,0.06);
}

.day-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
}

.day-btn{
    border:none;
    background:#ece2d2;
    width:42px;
    height:42px;
    border-radius:14px;
    font-size:18px;
    color:#4e4337;
}

.day-text{
    font-size:14px;
    opacity:0.65;
    letter-spacing:2px;
}

.tool-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:center;
}

.color{
    width:28px;
    height:28px;
    border-radius:50%;
    border:2px solid rgba(0,0,0,0.08);
}

.tool-btn{
    border:none;
    background:#ece2d2;
    color:#4e4337;
    border-radius:12px;
    padding:10px 12px;
    font-family:'Noto Serif KR', serif;
    font-size:13px;
}

.tool-btn.active{
    background:#d8c4a6;
}

.page{
    background:#faf6ee;
    border-radius:28px;
    padding:30px 22px 38px;
    box-shadow:0 10px 35px rgba(0,0,0,0.06);
    overflow:hidden;
    position:relative;
}

/* 종이 질감 */

.page::before{
    content:'';
    position:absolute;
    inset:0;
    opacity:0.22;
    background-image:
    radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size:4px 4px;
    pointer-events:none;
}

/* 줄노트 */

.page::after{
    content:'';
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 41px,
        rgba(120,100,70,0.08) 42px
    );
    pointer-events:none;
}

.content{
    position:relative;
    z-index:2;
}

.top{
    text-align:center;
    margin-bottom:34px;
}

.date{
    font-size:14px;
    opacity:0.7;
    margin-bottom:10px;
}

.day{
    font-size:13px;
    opacity:0.5;
    letter-spacing:4px;
}

.quote{
    text-align:center;
    margin-bottom:36px;
}

.quote-text{
    font-size:25px;
    line-height:1.9;
    margin-bottom:24px;
    white-space:pre-line;
    word-break:keep-all;
}

.author{
    font-size:15px;
    opacity:0.6;
    line-height:1.7;
}

.writing-wrap{
    position:relative;
    width:100%;
    height:650px;
    border-radius:20px;
    overflow:hidden;
    background:rgba(255,255,255,0.12);
}

.guide{
    position:absolute;
    inset:24px;
    font-size:29px;
    line-height:2.2;
    color:rgba(0,0,0,0.06);
    white-space:pre-line;
    pointer-events:none;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
    position:relative;
    z-index:2;
}

.footer{
    text-align:center;
    margin-top:28px;
    font-size:12px;
    opacity:0.45;
    line-height:1.8;
}

.range{
    width:90px;
}

@media(max-width:480px){

    .quote-text{
        font-size:22px;
    }

    .guide{
        font-size:25px;
    }

    .writing-wrap{
        height:560px;
    }
}

</style>
</head>

<body>

<div class="app">

    <!-- 툴바 -->

    <div class="toolbar">

        <div class="day-nav">

            <button class="day-btn" onclick="changeDay(-1)">←</button>

            <div class="day-text" id="toolbarDay">
                DAY 1
            </div>

            <button class="day-btn" onclick="changeDay(1)">→</button>

        </div>

        <div class="tool-row">

            <!-- 색상 -->

            <button class="color" style="background:#2d2d2d"
            onclick="setColor('#2d2d2d')"></button>

            <button class="color" style="background:#5a3d2b"
            onclick="setColor('#5a3d2b')"></button>

            <button class="color" style="background:#2f4858"
            onclick="setColor('#2f4858')"></button>

            <button class="color" style="background:#6b3f46"
            onclick="setColor('#6b3f46')"></button>

            <!-- 굵기 -->

            <input type="range"
            min="2"
            max="14"
            value="4"
            class="range"
            onchange="setBrushSize(this.value)">

            <!-- 도구 -->

            <button class="tool-btn active" id="penBtn"
            onclick="setPen()">
                ✏ 펜
            </button>

            <button class="tool-btn" id="eraserBtn"
            onclick="setEraser()">
                🩹 지우개
            </button>

            <button class="tool-btn"
            onclick="undoLast()">
                ↶ 되돌리기
            </button>

            <button class="tool-btn"
            onclick="clearCanvas()">
                🗑 전체삭제
            </button>

            <button class="tool-btn"
            onclick="saveImage()">
                💾 저장
            </button>

        </div>

    </div>

    <!-- 페이지 -->

    <div class="page" id="capture">

        <div class="content">

            <div class="top">

                <div class="date" id="dateText"></div>

                <div class="day" id="dayText"></div>

            </div>

            <div class="quote">

                <div class="quote-text" id="quoteText"></div>

                <div class="author">
                    <span id="authorText"></span><br>
                    <span id="engAuthorText"></span>
                </div>

            </div>

            <div class="writing-wrap">

                <div class="guide" id="guideText"></div>

                <canvas id="canvas"></canvas>

            </div>

            <div class="footer">
                오늘도 잘 살아냈다.<br>
                1일 1필사
            </div>

        </div>

    </div>

</div>

<script>

/* =========================
   명언 데이터
========================= */

const quotes = [

{
text:`힘든 하루였다는 건
그만큼 버텼다는 뜻이다.`,
author:'공자',
eng:'Confucius'
},

{
text:`쉬어가는 것은
포기하는 것이 아니다.`,
author:'세네카',
eng:'Seneca'
},

{
text:`상처 없는 사람보다
회복한 사람이 강하다.`,
author:'니체',
eng:'Nietzsche'
},

{
text:`오늘의 작은 버팀이
내일의 나를 만든다.`,
author:'맹자',
eng:'Mencius'
},

{
text:`Success is not final,
failure is not fatal.`,
author:'윈스턴 처칠',
eng:'Winston Churchill'
},

{
text:`넘어졌다는 건
앞으로 나아갔다는 뜻이다.`,
author:'노자',
eng:'Laozi'
}

];

/* =========================
   날짜
========================= */

const realToday = new Date();

const start = new Date(realToday.getFullYear(),0,0);

const diff = realToday - start;

const oneDay = 1000 * 60 * 60 * 24;

let currentDay = Math.floor(diff / oneDay);

/* =========================
   화면 갱신
========================= */

function renderPage(){

    const fakeDate = new Date(
        realToday.getFullYear(),
        0,
        currentDay
    );

    const year = fakeDate.getFullYear();
    const month = fakeDate.getMonth()+1;
    const date = fakeDate.getDate();

    document.getElementById('dateText').innerText =
    `${year}년 ${month}월 ${date}일`;

    document.getElementById('dayText').innerText =
    `DAY ${currentDay}`;

    document.getElementById('toolbarDay').innerText =
    `DAY ${currentDay}`;

    const quote =
    quotes[currentDay % quotes.length];

    document.getElementById('quoteText').innerText =
    quote.text;

    document.getElementById('guideText').innerText =
    quote.text;

    document.getElementById('authorText').innerText =
    `— ${quote.author}`;

    document.getElementById('engAuthorText').innerText =
    quote.eng;

    clearCanvas();
}

renderPage();

/* =========================
   날짜 이동
========================= */

function changeDay(value){

    currentDay += value;

    if(currentDay < 1){
        currentDay = 365;
    }

    if(currentDay > 365){
        currentDay = 1;
    }

    renderPage();
}

/* =========================
   캔버스
========================= */

const canvas = document.getElementById('canvas');

const ctx = canvas.getContext('2d');

let drawing = false;

let brushColor = '#2d2d2d';

let brushSize = 4;

let isEraser = false;

let history = [];

function resizeCanvas(){

    canvas.width = canvas.offsetWidth;

    canvas.height = canvas.offsetHeight;

    redrawHistory();
}

resizeCanvas();

window.addEventListener('resize', resizeCanvas);

/* =========================
   히스토리 저장
========================= */

function saveState(){

    history.push(
        canvas.toDataURL()
    );

    if(history.length > 30){
        history.shift();
    }
}

/* =========================
   undo
========================= */

function undoLast(){

    if(history.length === 0){

        clearCanvas();

        return;
    }

    history.pop();

    redrawHistory();
}

function redrawHistory(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(history.length === 0) return;

    const img = new Image();

    img.src =
    history[history.length - 1];

    img.onload = () => {

        ctx.drawImage(
            img,
            0,
            0
        );
    };
}

/* =========================
   좌표
========================= */

function getXY(e){

    const rect =
    canvas.getBoundingClientRect();

    if(e.touches){

        return{
            x:e.touches[0].clientX - rect.left,
            y:e.touches[0].clientY - rect.top
        };

    }else{

        return{
            x:e.clientX - rect.left,
            y:e.clientY - rect.top
        };
    }
}

/* =========================
   시작
========================= */

function startDraw(e){

    drawing = true;

    saveState();

    const pos = getXY(e);

    ctx.beginPath();

    ctx.moveTo(pos.x,pos.y);
}

/* =========================
   그리기
========================= */

function draw(e){

    if(!drawing) return;

    e.preventDefault();

    const pos = getXY(e);

    ctx.lineWidth = brushSize;

    ctx.lineCap = 'round';

    ctx.lineJoin = 'round';

    if(isEraser){

        ctx.globalCompositeOperation =
        'destination-out';

    }else{

        ctx.globalCompositeOperation =
        'source-over';

        ctx.strokeStyle = brushColor;
    }

    ctx.lineTo(pos.x,pos.y);

    ctx.stroke();
}

/* =========================
   끝
========================= */

function endDraw(){

    drawing = false;

    ctx.beginPath();
}

canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('mousemove',draw);
canvas.addEventListener('mouseup',endDraw);

canvas.addEventListener('touchstart',startDraw);
canvas.addEventListener('touchmove',draw);
canvas.addEventListener('touchend',endDraw);

/* =========================
   색상
========================= */

function setColor(color){

    brushColor = color;

    setPen();
}

/* =========================
   굵기
========================= */

function setBrushSize(size){

    brushSize = size;
}

/* =========================
   펜
========================= */

function setPen(){

    isEraser = false;

    document
    .getElementById('penBtn')
    .classList.add('active');

    document
    .getElementById('eraserBtn')
    .classList.remove('active');
}

/* =========================
   지우개
========================= */

function setEraser(){

    isEraser = true;

    document
    .getElementById('eraserBtn')
    .classList.add('active');

    document
    .getElementById('penBtn')
    .classList.remove('active');
}

/* =========================
   전체삭제
========================= */

function clearCanvas(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    history = [];
}

/* =========================
   저장
========================= */

function saveImage(){

    html2canvas(
        document.querySelector("#capture"),
        {
            backgroundColor:null,
            scale:2
        }

    ).then(canvas => {

        const link =
        document.createElement('a');

        link.download =
        `1일1필사_DAY${currentDay}.png`;

        link.href =
        canvas.toDataURL();

        link.click();
    });
}

</script>

</body>
</html>
